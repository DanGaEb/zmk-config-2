# --- ZMK Studio Support ---
# CONFIG_ZMK_STUDIO=y

# --- USB Connectivity & Windows Fixes ---
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_VID=0x1D50
CONFIG_USB_DEVICE_PID=0x6161

# --- Mouse Support ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# --- Bluetooth Stability & Battery Proxy ---
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Power Management ---
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=60000

# --- Cleanup ---
# Logging must be OFF for Studio to work over USB
# CONFIG_ZMK_USB_LOGGING=n

CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2